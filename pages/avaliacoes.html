<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de cadastro e listagem de avalia&ccedil;&otilde;es">
        <title>Avalia&ccedil;&otilde;es | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="mb-1">Avalia&ccedil;&otilde;es</h1>
                    <p class="text-muted mb-0">Registre e visualize avalia&ccedil;&otilde;es de usu&aacute;rios nos cursos.</p>
                </div>
                <button
                    type="button"
                    class="btn btn-primary"
                    id="btn-inserir-avaliacao"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-avaliacao"
                >
                    Inserir
                </button>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Lista de Avalia&ccedil;&otilde;es</h2>
                <div>
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Usu&aacute;rio</th>
                                <th>Curso</th>
                                <th>Nota</th>
                                <th>Coment&aacute;rio</th>
                                <th>Data da avalia&ccedil;&atilde;o</th>
                                <th>A&ccedil;&otilde;es</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-avaliacoes">
                            <tr>
                                <td colspan="6" class="text-center text-muted">Nenhuma avalia&ccedil;&atilde;o cadastrada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="modal-avaliacao" tabindex="-1" aria-labelledby="titulo-modal-avaliacao" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="titulo-modal-avaliacao">Nova Avalia&ccedil;&atilde;o</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>

                    <form id="form-avaliacao">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="usuario-avaliacao" class="form-label">Usu&aacute;rio</label>
                                <select class="form-select" id="usuario-avaliacao" name="usuario">
                                    <option value="">Selecione um usu&aacute;rio</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="curso-avaliacao" class="form-label">Curso</label>
                                <select class="form-select" id="curso-avaliacao" name="curso">
                                    <option value="">Selecione um curso</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="nota-avaliacao" class="form-label">Nota</label>
                                <select class="form-select" id="nota-avaliacao" name="nota">
                                    <option value="">Selecione a nota</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="comentario-avaliacao" class="form-label">Coment&aacute;rio</label>
                                <textarea class="form-control" id="comentario-avaliacao" name="comentario" rows="3"></textarea>
                            </div>

                            <div class="mb-0">
                                <label for="data-avaliacao" class="form-label">Data da avalia&ccedil;&atilde;o</label>
                                <input type="date" class="form-control" id="data-avaliacao" name="dataAvaliacao">
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btn-salvar-avaliacao">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
