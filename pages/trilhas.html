<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de cadastro e listagem de trilhas de conhecimento">
        <title>Trilhas | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="mb-4">
                <h1 class="mb-2">Trilhas</h1>
                <p class="text-muted mb-0">
                    Cadastre trilhas de conhecimento e organize os cursos dentro de cada trilha.
                </p>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Nova Trilha</h2>
                <form id="form-trilha">
                    <div class="mb-3">
                        <label for="titulo-trilha" class="form-label">T&iacute;tulo</label>
                        <input type="text" class="form-control" id="titulo-trilha" name="tituloTrilha">
                    </div>

                    <div class="mb-3">
                        <label for="descricao-trilha" class="form-label">Descri&ccedil;&atilde;o</label>
                        <textarea class="form-control" id="descricao-trilha" name="descricaoTrilha" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="categoria-trilha" class="form-label">Categoria</label>
                        <select class="form-select" id="categoria-trilha" name="categoriaTrilha">
                            <option value="">Selecione uma categoria</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Cadastrar trilha</button>
                </form>
            </section>

            <section class="bg-white border rounded-3 p-4">
                <h2 class="h5 mb-3">Lista de Trilhas</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>T&iacute;tulo</th>
                                <th>Categoria</th>
                                <th>Descri&ccedil;&atilde;o</th>
                                <th>A&ccedil;&otilde;es</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-trilhas">
                            <tr>
                                <td colspan="3" class="text-center text-muted">Nenhuma trilha cadastrada.</td>
                                <td class="text-center">
                                    <button type="button" class="btn btn-sm btn-outline-secondary" disabled>
                                        Gerenciar cursos
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
