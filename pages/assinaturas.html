<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de cadastro e listagem de assinaturas">
        <title>Assinaturas | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="mb-4">
                <h1 class="mb-2">Assinaturas</h1>
                <p class="text-muted mb-0">
                    Associe usu&aacute;rios aos planos da plataforma e visualize as assinaturas registradas.
                </p>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Nova Assinatura</h2>
                <form id="form-assinatura">
                    <div class="mb-3">
                        <label for="usuario-assinatura" class="form-label">Usu&aacute;rio</label>
                        <select class="form-select" id="usuario-assinatura" name="usuario">
                            <option value="">Selecione um usu&aacute;rio</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="plano-assinatura" class="form-label">Plano</label>
                        <select class="form-select" id="plano-assinatura" name="plano">
                            <option value="">Selecione um plano</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="data-inicio-assinatura" class="form-label">Data de in&iacute;cio</label>
                        <input
                            type="date"
                            class="form-control"
                            id="data-inicio-assinatura"
                            name="dataInicio"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="data-fim-assinatura" class="form-label">Data de fim</label>
                        <input type="date" class="form-control" id="data-fim-assinatura" name="dataFim">
                        <div class="form-text">
                            A data final pode ser preenchida automaticamente pela dura&ccedil;&atilde;o do plano.
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Registrar assinatura</button>
                </form>
            </section>

            <section class="bg-white border rounded-3 p-4">
                <h2 class="h5 mb-3">Lista de Assinaturas</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Usu&aacute;rio</th>
                                <th>Plano</th>
                                <th>Data de in&iacute;cio</th>
                                <th>Data de fim</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-assinaturas">
                            <tr>
                                <td colspan="4" class="text-center text-muted">Nenhuma assinatura cadastrada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
