<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de cadastro e listagem de assinaturas">
        <title>Assinaturas | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="mb-1">Assinaturas</h1>
                    <p class="text-muted mb-0">
                        Associe usu&aacute;rios aos planos da plataforma e visualize as assinaturas registradas.
                    </p>
                </div>
                <button
                    type="button"
                    class="btn btn-primary"
                    id="btn-inserir-assinatura"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-assinatura"
                >
                    Inserir
                </button>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Lista de Assinaturas</h2>
                <div class="table-responsive overflow-visible">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Usu&aacute;rio</th>
                                <th>Plano</th>
                                <th>Data de in&iacute;cio</th>
                                <th>Data de fim</th>
                                <th>A&ccedil;&otilde;es</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-assinaturas">
                            <tr>
                                <td colspan="5" class="text-center text-muted">Nenhuma assinatura cadastrada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="modal-assinatura" tabindex="-1" aria-labelledby="titulo-modal-assinatura" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="titulo-modal-assinatura">Nova Assinatura</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>

                    <form id="form-assinatura">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="usuario-assinatura" class="form-label">Usu&aacute;rio</label>
                                <select class="form-select" id="usuario-assinatura" name="usuario">
                                    <option value="">Selecione um usu&aacute;rio</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="plano-assinatura" class="form-label">Plano</label>
                                <select class="form-select" id="plano-assinatura" name="plano">
                                    <option value="">Selecione um plano</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="data-inicio-assinatura" class="form-label">Data de in&iacute;cio</label>
                                <input
                                    type="date"
                                    class="form-control"
                                    id="data-inicio-assinatura"
                                    name="dataInicio"
                                >
                            </div>

                            <div class="mb-0">
                                <label for="data-fim-assinatura" class="form-label">Data de fim</label>
                                <input type="date" class="form-control" id="data-fim-assinatura" name="dataFim">
                                <div class="form-text">
                                    A data final pode ser preenchida automaticamente pela dura&ccedil;&atilde;o do plano.
                                </div>
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btn-salvar-assinatura">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
