<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Página de cadastro e listagem de planos">
        <title>Planos | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="mb-1">Planos</h1>
                    <p class="text-muted mb-0">
                        Cadastre e visualize os planos de assinatura da plataforma.
                    </p>
                </div>
                <button
                    type="button"
                    class="btn btn-primary"
                    id="btn-inserir-plano"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-plano"
                >
                    Inserir
                </button>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Lista de Planos</h2>
                <div class="table-responsive overflow-visible">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Nome</th>
                                <th>Descri&ccedil;&atilde;o</th>
                                <th>Pre&ccedil;o</th>
                                <th>Dura&ccedil;&atilde;o</th>
                                <th>A&ccedil;&otilde;es</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-planos">
                            <tr>
                                <td colspan="5" class="text-center text-muted">Nenhum plano cadastrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="modal-plano" tabindex="-1" aria-labelledby="titulo-modal-plano" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="titulo-modal-plano">Novo Plano</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>

                    <form id="form-plano">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="nome-plano" class="form-label">Nome do plano</label>
                                <input type="text" class="form-control" id="nome-plano" name="nomePlano">
                            </div>

                            <div class="mb-3">
                                <label for="descricao-plano" class="form-label">Descri&ccedil;&atilde;o</label>
                                <textarea class="form-control" id="descricao-plano" name="descricaoPlano" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="preco-plano" class="form-label">Pre&ccedil;o</label>
                                <input type="number" class="form-control" id="preco-plano" name="precoPlano" step="0.01" min="0">
                            </div>

                            <div class="mb-0">
                                <label for="duracao-meses" class="form-label">Dura&ccedil;&atilde;o em meses</label>
                                <input type="number" class="form-control" id="duracao-meses" name="duracaoMeses" min="1">
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btn-salvar-plano">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
