<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de gerenciamento de cursos da trilha">
        <title>Cursos da Trilha | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="mb-1">Cursos da Trilha</h1>
                    <p class="text-muted mb-0">
                        Trilha selecionada:
                        <span id="nome-trilha-selecionada" class="fw-semibold">Nome da Trilha</span>
                    </p>
                </div>
                <button
                    type="button"
                    class="btn btn-primary"
                    id="btn-inserir-trilha-curso"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-trilha-curso"
                >
                    Inserir
                </button>
            </section>

            <section class="bg-white border rounded-3 p-4">
                <h2 class="h5 mb-3">Lista de Cursos da Trilha</h2>
                <div>
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Curso</th>
                                <th>Ordem</th>
                                <th>A&ccedil;&otilde;es</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-trilha-cursos">
                            <tr>
                                <td colspan="3" class="text-center text-muted">Nenhum curso vinculado a esta trilha.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="modal-trilha-curso" tabindex="-1" aria-labelledby="titulo-modal-trilha-curso" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="titulo-modal-trilha-curso">Adicionar Curso</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>

                    <form id="form-trilha-cursos">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="curso-trilha" class="form-label">Curso</label>
                                <select class="form-select" id="curso-trilha" name="cursoTrilha">
                                    <option value="">Selecione um curso</option>
                                </select>
                            </div>

                            <div class="mb-0">
                                <label for="ordem-curso-trilha" class="form-label">Ordem</label>
                                <input type="number" class="form-control" id="ordem-curso-trilha" name="ordemCursoTrilha" min="1">
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btn-salvar-trilha-curso">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
