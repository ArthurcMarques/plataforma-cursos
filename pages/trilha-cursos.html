<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de gerenciamento de cursos da trilha">
        <title>Cursos da Trilha | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="mb-4">
                <h1 class="mb-2">Cursos da Trilha</h1>
                <p class="text-muted mb-0">
                    Trilha selecionada:
                    <span id="nome-trilha-selecionada" class="fw-semibold">Nome da Trilha</span>
                </p>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Adicionar Curso</h2>
                <form id="form-trilha-cursos">
                    <div class="mb-3">
                        <label for="curso-trilha" class="form-label">Curso</label>
                        <select class="form-select" id="curso-trilha" name="cursoTrilha">
                            <option value="">Selecione um curso</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="ordem-curso-trilha" class="form-label">Ordem</label>
                        <input type="number" class="form-control" id="ordem-curso-trilha" name="ordemCursoTrilha" min="1">
                    </div>

                    <button type="submit" class="btn btn-primary">Adicionar curso &agrave; trilha</button>
                </form>
            </section>

            <section class="bg-white border rounded-3 p-4">
                <h2 class="h5 mb-3">Lista de Cursos da Trilha</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Curso</th>
                                <th>Ordem</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-trilha-cursos">
                            <tr>
                                <td colspan="2" class="text-center text-muted">Nenhum curso vinculado a esta trilha.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
