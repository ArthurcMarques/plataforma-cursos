<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de cadastro e listagem de pagamentos">
        <title>Pagamentos | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="mb-1">Pagamentos</h1>
                    <p class="text-muted mb-0">
                        Registre e visualize os pagamentos das assinaturas da plataforma.
                    </p>
                </div>
                <button
                    type="button"
                    class="btn btn-primary"
                    id="btn-inserir-pagamento"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-pagamento"
                >
                    Inserir
                </button>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Lista de Pagamentos</h2>
                <div class="table-responsive overflow-visible">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Assinatura</th>
                                <th>Valor pago</th>
                                <th>Data do pagamento</th>
                                <th>M&eacute;todo</th>
                                <th>ID da transa&ccedil;&atilde;o</th>
                                <th>A&ccedil;&otilde;es</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-pagamentos">
                            <tr>
                                <td colspan="6" class="text-center text-muted">Nenhum pagamento cadastrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="modal-pagamento" tabindex="-1" aria-labelledby="titulo-modal-pagamento" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="titulo-modal-pagamento">Novo Pagamento</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>

                    <form id="form-pagamento">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="assinatura-pagamento" class="form-label">Assinatura</label>
                                <select class="form-select" id="assinatura-pagamento" name="assinatura">
                                    <option value="">Selecione uma assinatura</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="valor-pago" class="form-label">Valor pago</label>
                                <input type="number" class="form-control" id="valor-pago" name="valorPago" step="0.01" min="0">
                            </div>

                            <div class="mb-3">
                                <label for="data-pagamento" class="form-label">Data do pagamento</label>
                                <input type="date" class="form-control" id="data-pagamento" name="dataPagamento">
                            </div>

                            <div class="mb-3">
                                <label for="metodo-pagamento" class="form-label">M&eacute;todo de pagamento</label>
                                <select class="form-select" id="metodo-pagamento" name="metodoPagamento">
                                    <option value="">Selecione o m&eacute;todo</option>
                                    <option value="Cart&atilde;o">Cart&atilde;o</option>
                                    <option value="Pix">Pix</option>
                                    <option value="Boleto">Boleto</option>
                                </select>
                            </div>

                            <div class="mb-0">
                                <label for="id-transacao" class="form-label">ID da transa&ccedil;&atilde;o</label>
                                <input type="text" class="form-control" id="id-transacao" name="idTransacao">
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btn-salvar-pagamento">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
