<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Página de cadastro e listagem de cursos">
        <title>Cursos | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="mb-4">
                <h1 class="mb-2">Cursos</h1>
                <p class="text-muted mb-0">Cadastre e visualize os cursos disponíveis na plataforma.</p>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Novo Curso</h2>
                <form id="form-curso">
                    <div class="mb-3">
                        <label for="titulo-curso" class="form-label">Título do curso</label>
                        <input type="text" class="form-control" id="titulo-curso" name="titulo">
                    </div>

                    <div class="mb-3">
                        <label for="descricao-curso" class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao-curso" name="descricao" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="nivel-curso" class="form-label">Nível</label>
                        <select class="form-select" id="nivel-curso" name="nivel">
                            <option value="">Selecione o nível</option>
                            <option value="Iniciante">Iniciante</option>
                            <option value="Intermediário">Intermediário</option>
                            <option value="Avançado">Avançado</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="categoria-curso" class="form-label">Categoria</label>
                        <select class="form-select" id="categoria-curso" name="categoria">
                            <option value="">Selecione uma categoria</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="instrutor-curso" class="form-label">Instrutor</label>
                        <select class="form-select" id="instrutor-curso" name="instrutor">
                            <option value="">Selecione um instrutor</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="data-publicacao-curso" class="form-label">Data de publicação</label>
                        <input type="date" class="form-control" id="data-publicacao-curso" name="dataPublicacao">
                    </div>

                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </form>
            </section>

            <section class="bg-white border rounded-3 p-4">
                <h2 class="h5 mb-3">Lista de Cursos</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Título</th>
                                <th>Categoria</th>
                                <th>Instrutor</th>
                                <th>Nível</th>
                                <th>Total de aulas</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-cursos">
                            <tr>
                                <td colspan="6" class="text-center text-muted">Nenhum curso cadastrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
