<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de cadastro e listagem de aulas por m&oacute;dulo">
        <title>Aulas do M&oacute;dulo | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="mb-1">Aulas do M&oacute;dulo</h1>
                    <p class="text-muted mb-1">M&oacute;dulo selecionado:</p>
                    <p class="fw-semibold mb-1" id="nome-modulo">Nome do m&oacute;dulo (placeholder)</p>
                    <p class="small text-muted mb-0">
                        Curso relacionado: <span id="nome-curso">Nome do curso (placeholder)</span>
                    </p>
                </div>
                <button
                    type="button"
                    class="btn btn-primary"
                    id="btn-inserir-aula"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-aula"
                >
                    Inserir
                </button>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Lista de Aulas</h2>
                <div class="table-responsive overflow-visible">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>T&iacute;tulo</th>
                                <th>Tipo de conte&uacute;do</th>
                                <th>Dura&ccedil;&atilde;o</th>
                                <th>Ordem</th>
                                <th>A&ccedil;&otilde;es</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-aulas">
                            <tr>
                                <td colspan="5" class="text-center text-muted">Nenhuma aula cadastrada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="modal-aula" tabindex="-1" aria-labelledby="titulo-modal-aula" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="titulo-modal-aula">Nova Aula</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>

                    <form id="form-aula">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="titulo-aula" class="form-label">T&iacute;tulo da aula</label>
                                <input type="text" class="form-control" id="titulo-aula" name="tituloAula">
                            </div>

                            <div class="mb-3">
                                <label for="tipo-conteudo" class="form-label">Tipo de conte&uacute;do</label>
                                <select class="form-select" id="tipo-conteudo" name="tipoConteudo">
                                    <option value="">Selecione o tipo</option>
                                    <option value="Video">V&iacute;deo</option>
                                    <option value="Texto">Texto</option>
                                    <option value="Quiz">Quiz</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="url-conteudo" class="form-label">URL do conte&uacute;do</label>
                                <input type="url" class="form-control" id="url-conteudo" name="urlConteudo">
                            </div>

                            <div class="mb-3">
                                <label for="duracao-minutos" class="form-label">Dura&ccedil;&atilde;o em minutos</label>
                                <input type="number" class="form-control" id="duracao-minutos" name="duracaoMinutos" min="1">
                            </div>

                            <div class="mb-0">
                                <label for="ordem-aula" class="form-label">Ordem</label>
                                <input type="number" class="form-control" id="ordem-aula" name="ordemAula" min="1">
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btn-salvar-aula">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
