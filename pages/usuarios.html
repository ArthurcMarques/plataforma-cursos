<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Página de cadastro e listagem de usuários">
        <title>Usuários | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="mb-4">
                <h1 class="mb-2">Usuários</h1>
                <p class="text-muted mb-0">Cadastre e visualize os usuários da plataforma de cursos.</p>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Novo Usuário</h2>
                <form id="form-usuario">
                    <div class="mb-3">
                        <label for="nome-usuario" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="nome-usuario" name="nome">
                    </div>

                    <div class="mb-3">
                        <label for="email-usuario" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email-usuario" name="email">
                    </div>

                    <div class="mb-3">
                        <label for="senha-usuario" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha-usuario" name="senha">
                    </div>

                    <div class="mb-3">
                        <label for="data-cadastro-usuario" class="form-label">Data de cadastro</label>
                        <input type="date" class="form-control" id="data-cadastro-usuario" name="dataCadastro">
                    </div>

                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </form>
            </section>

            <section class="bg-white border rounded-3 p-4">
                <h2 class="h5 mb-3">Lista de Usuários</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Matrícula</th>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Data de cadastro</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-usuarios">
                            <tr>
                                <td colspan="4" class="text-center text-muted">Nenhum usuário cadastrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
