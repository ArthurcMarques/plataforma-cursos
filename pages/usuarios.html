<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de cadastro e listagem de usu&aacute;rios">
        <title>Usu&aacute;rios | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="mb-1">Usu&aacute;rios</h1>
                    <p class="text-muted mb-0">Cadastre e visualize os usu&aacute;rios da plataforma de cursos.</p>
                </div>
                <button
                    type="button"
                    class="btn btn-primary"
                    id="btn-inserir-usuario"
                    data-bs-toggle="modal"
                    data-bs-target="#modal-usuario"
                >
                    Inserir
                </button>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Lista de Usu&aacute;rios</h2>
                <div class="table-responsive overflow-visible">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Matr&iacute;cula</th>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Data de cadastro</th>
                                <th>A&ccedil;&otilde;es</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-usuarios">
                            <tr>
                                <td colspan="5" class="text-center text-muted">Nenhum usu&aacute;rio cadastrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="modal-usuario" tabindex="-1" aria-labelledby="titulo-modal-usuario" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="titulo-modal-usuario">Novo Usu&aacute;rio</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>

                    <form id="form-usuario">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="nome-usuario" class="form-label">Nome completo</label>
                                <input type="text" class="form-control" id="nome-usuario" name="nome">
                            </div>

                            <div class="mb-3">
                                <label for="email-usuario" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email-usuario" name="email">
                            </div>

                            <div class="mb-3">
                                <label for="senha-usuario" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha-usuario" name="senha">
                            </div>

                            <div class="mb-0">
                                <label for="data-cadastro-usuario" class="form-label">Data de cadastro</label>
                                <input type="date" class="form-control" id="data-cadastro-usuario" name="dataCadastro">
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btn-salvar-usuario">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
