<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Pagina de cadastro e listagem de categorias">
        <title>Categorias | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="mb-4">
                <h1 class="mb-2">Categorias</h1>
                <p class="text-muted mb-0">Cadastre e visualize as categorias disponiveis na plataforma.</p>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Nova Categoria</h2>
                <form id="form-categoria">
                    <div class="mb-3">
                        <label for="nome-categoria" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nome-categoria" name="nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="descricao-categoria" class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao-categoria" name="descricao" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </form>
            </section>

            <section class="bg-white border rounded-3 p-4">
                <h2 class="h5 mb-3">Lista de Categorias</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Nome</th>
                                <th>Descrição</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-categorias"></tbody>
                    </table>
                </div>
            </section>
        </main>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
