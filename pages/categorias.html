<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Pagina de cadastro e listagem de categorias">
        <title>Categorias | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="mb-4">
                <h1 class="mb-2">Categorias</h1>
                <p class="text-muted mb-0">Cadastre e visualize as categorias disponiveis na plataforma.</p>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Nova Categoria</h2>
                <form>
                    <div class="mb-3">
                        <label for="nomeCategoria" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nomeCategoria" name="nome">
                    </div>
                    <div class="mb-3">
                        <label for="descricaoCategoria" class="form-label">Descricao</label>
                        <textarea class="form-control" id="descricaoCategoria" name="descricao" rows="3"></textarea>
                    </div>
                    <button type="button" class="btn btn-primary">Cadastrar</button>
                </form>
            </section>

            <section class="bg-white border rounded-3 p-4">
                <h2 class="h5 mb-3">Lista de Categorias</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Nome</th>
                                <th>Descricao</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="2" class="text-center text-muted">Nenhuma categoria cadastrada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </body>
</html>
