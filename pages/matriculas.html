<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="P&aacute;gina de cadastro e listagem de matr&iacute;culas">
        <title>Matr&iacute;culas | Plataforma de Cursos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5">
            <section class="mb-4">
                <h1 class="mb-2">Matr&iacute;culas</h1>
                <p class="text-muted mb-0">Realize e visualize as matr&iacute;culas de usu&aacute;rios nos cursos.</p>
            </section>

            <section class="bg-white border rounded-3 p-4 mb-4">
                <h2 class="h5 mb-3">Nova Matr&iacute;cula</h2>
                <form id="form-matricula">
                    <div class="mb-3">
                        <label for="usuario-matricula" class="form-label">Usu&aacute;rio</label>
                        <select class="form-select" id="usuario-matricula" name="usuario">
                            <option value="">Selecione um usu&aacute;rio</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="curso-matricula" class="form-label">Curso</label>
                        <select class="form-select" id="curso-matricula" name="curso">
                            <option value="">Selecione um curso</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Matricular</button>
                </form>
            </section>

            <section class="bg-white border rounded-3 p-4">
                <h2 class="h5 mb-3">Lista de Matr&iacute;culas</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Usu&aacute;rio</th>
                                <th>Curso</th>
                                <th>Data da matr&iacute;cula</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-matriculas">
                            <tr>
                                <td colspan="3" class="text-center text-muted">Nenhuma matr&iacute;cula cadastrada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <script type="module" src="../js/main.js"></script>
    </body>
</html>
